{{ define "main" }}

<!-- Desktop hero (hidden on mobile via main.css) -->
<div class="hero-desktop-block" style="position:relative;width:100%;height:480px;overflow:hidden;display:block;">
  <img src="/banner.png" alt="" style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;object-position:center;z-index:0;" />
  <div style="position:absolute;top:0;left:0;width:100%;height:100%;z-index:10;display:flex;align-items:center;padding-left:80px;padding-right:80px;box-sizing:border-box;">
    <h1 style="font-family:'Space Grotesk',sans-serif;font-size:3rem;font-weight:700;color:#ffffff;letter-spacing:-0.03em;line-height:1.15;max-width:560px;text-shadow:0 0 30px rgba(0,0,0,1),0 2px 20px rgba(0,0,0,0.9);margin:0;padding:0;">Ethwei brings the world onchain access to global assets and financial freedom</h1>
  </div>
</div>

<!-- Mobile hero (hidden on desktop via main.css) -->
<div class="hero-mobile-block">
  <div style="overflow:hidden;height:280px;display:flex;align-items:center;justify-content:center;margin-bottom:-40px;">
    <img src="/banner.png" alt="" style="width:160%;margin-right:25%;object-fit:contain;" />
  </div>
  <div style="padding:0 24px 40px;background:var(--bg);">
    <h1 style="font-family:'Space Grotesk',sans-serif;font-size:1.9rem;font-weight:700;color:var(--text);letter-spacing:-0.03em;line-height:1.2;margin:0;">Ethwei brings the world onchain access to global assets and financial freedom</h1>
  </div>
</div>

<section id="converter" style="padding:80px 24px;">
  <div style="max-width:1200px;margin:0 auto;text-align:center;color:var(--text-2);">
    Converter coming soon.
  </div>
</section>

{{ end }}
